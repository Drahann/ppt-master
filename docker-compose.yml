services:
  redis:
    image: redis:7-alpine
    container_name: ppt-master-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  ppt-master-api:
    build: .
    container_name: ppt-master-api
    depends_on:
      - redis
    ports:
      - "3001:3000"
    env_file:
      - .env.api
    environment:
      PPT_API_HOST: 0.0.0.0
      PPT_API_PORT: 3000
      REDIS_URL: redis://redis:6379/0
      PPT_API_PROJECT_BASE_DIR: /app/projects
      PPT_API_JOBS_DIR: /app/tmp/api-jobs
    volumes:
      - ./projects:/app/projects
      - ./tmp:/app/tmp
    restart: unless-stopped

volumes:
  redis-data:
