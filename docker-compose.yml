services:
  ppt-master-api:
    build: .
    container_name: ppt-master-api
    ports:
      - "${PPT_API_HOST_PORT:-3001}:3000"
    env_file:
      - .env.api
    environment:
      PPT_API_HOST: 0.0.0.0
      PPT_API_PORT: 3000
      PPT_API_PROJECT_BASE_DIR: /app/projects
      PPT_API_JOBS_DIR: /app/tmp/api-jobs
    volumes:
      - ./projects:/app/projects
      - ./tmp:/app/tmp
      - ./secrets:/app/secrets:ro
    restart: unless-stopped
