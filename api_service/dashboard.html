<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>PPT Master API</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 32px; color: #0f172a; }
      pre { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 6px; padding: 16px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>PPT Master API</h1>
    <pre id="metrics">loading...</pre>
    <script>
      async function refresh() {
        const res = await fetch("/metrics");
        document.getElementById("metrics").textContent = JSON.stringify(await res.json(), null, 2);
      }
      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
